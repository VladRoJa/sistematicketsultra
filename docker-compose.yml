#docker-compose.yml


version: '3.8'
services:
  db:
    image: postgres:15 
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Insul1n4
      TZ: America/Tijuana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./wal-archive:/var/backups/postgres/wal
    networks:
      - backend-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.docker
    environment:           # 👈 NUEVO: forzamos que existan dentro del contenedor
      APP_ENV: "prod"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "notificaciones.ultragym@gmail.com"
      SMTP_PASS: "dsjvthlmjrghuwvi"
      EMAIL_FROM: "notificaciones.ultragym@gmail.com"
      SMTP_DEBUG: "1"          # para ver el diálogo SMTP
      SMTP_SYNC_DEBUG: "1"     # para envío síncrono (sin thread) mientras depuramos

    command: >
      gunicorn
      --workers 2
      --worker-class sync
      --timeout 300
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
      --capture-output
      -b 0.0.0.0:5000
      app.wsgi:app
    ports:
      - "5000:5000"
    networks:
      - backend-net
    volumes:
      - /home/adminrdp/sistematicketsultra/uploads:/uploads



  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - backend-net
    volumes:
      - /home/adminrdp/sistematicketsultra/uploads:/usr/share/nginx/html/uploads:ro


  track-scheduler:
    build:
      context: ./backend
    depends_on:
      - db
    env_file:
      - .env.docker
    environment:
      APP_ENV: "prod"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "notificaciones.ultragym@gmail.com"
      SMTP_PASS: "dsjvthlmjrghuwvi"
      EMAIL_FROM: "notificaciones.ultragym@gmail.com"
      SMTP_DEBUG: "1"
      SMTP_SYNC_DEBUG: "1"
    command: python -m app.warehouse.scheduler.track_scheduler_worker
    networks:
      - backend-net
    volumes:
      - /home/adminrdp/sistematicketsultra/uploads:/uploads
    profiles:
      - scheduler
      

volumes:
  postgres_data:

networks:
  backend-net:
