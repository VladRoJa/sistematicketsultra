server {
    listen 80;
    server_name suiteultragym.com www.suiteultragym.com localhost;

    # Let's Encrypt ACME challenge.
    # Certbot writes challenge files into ./certbot/www on the host,
    # mounted inside this container at /var/www/certbot.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://suiteultragym.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name suiteultragym.com www.suiteultragym.com;

    client_max_body_size 75M;

    ssl_certificate /etc/letsencrypt/live/suiteultragym.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suiteultragym.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    # API Flask
    # Angular llama /api/... y Nginx lo manda al servicio backend dentro de Docker.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Angular SPA con hash routing.
    # Mantiene funcionando /#/ruta y recargas del navegador.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
