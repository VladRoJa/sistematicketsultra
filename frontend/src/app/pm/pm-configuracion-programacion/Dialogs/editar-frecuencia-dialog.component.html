<h2 mat-dialog-title>Editar frecuencia</h2>

<mat-dialog-content class="editar-frecuencia-dialog-content">
  <div class="editar-frecuencia-dialog-equipo">
    <strong>Equipo:</strong> {{ data.equipoLabel }}
  </div>

  <mat-form-field appearance="fill" class="editar-frecuencia-dialog-field">
    <mat-label>Nueva frecuencia (días)</mat-label>
    <input
      matInput
      type="number"
      [(ngModel)]="frecuencia"
      min="1">
  </mat-form-field>

  <div class="editar-frecuencia-dialog-error" *ngIf="mostrarError">
    La frecuencia debe ser un entero mayor a 0.
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancelar()">
    Cancelar
  </button>

  <button mat-raised-button color="primary" type="button" (click)="guardar()">
    Guardar
  </button>
</mat-dialog-actions>
