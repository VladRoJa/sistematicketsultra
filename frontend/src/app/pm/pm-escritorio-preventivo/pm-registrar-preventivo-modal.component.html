<h2 mat-dialog-title>Registrar PM — {{ equipoLabel }}</h2>

<mat-dialog-content>
    <form [formGroup]="form">

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Fecha</mat-label>
            <input matInput [matDatepicker]="dpFecha" formControlName="fecha" />
            <mat-datepicker-toggle matSuffix [for]="dpFecha"></mat-datepicker-toggle>
            <mat-datepicker #dpFecha></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Resultado</mat-label>
            <mat-select formControlName="resultado">
                <mat-option *ngFor="let opt of resultadoOptions" [value]="opt.value">
                    {{ opt.label }}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Notas</mat-label>
            <textarea matInput formControlName="notas" rows="3"></textarea>
        </mat-form-field>

        <div class="checks-group">
            <mat-checkbox formControlName="check_limpieza">Limpieza</mat-checkbox>
            <mat-checkbox formControlName="check_ajustes">Ajustes</mat-checkbox>
            <mat-checkbox formControlName="check_ruidos">Ruidos</mat-checkbox>
        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" [disabled]="guardarDisabled" (click)="guardar()">
        <span *ngIf="!saving">Guardar</span>
        <mat-spinner *ngIf="saving" diameter="20"></mat-spinner>
    </button>
</mat-dialog-actions>
