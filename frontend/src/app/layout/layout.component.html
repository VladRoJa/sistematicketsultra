<!-- src/app/layout/layout.component.html -->

<!-- ==========================================================================
     Suite Ultra UI v1 - Header principal y navegación
     ========================================================================== -->

<header
  class="suite-header"
  (mouseenter)="cancelarOcultarSubmenu()"
  (mouseleave)="programarOcultarSubmenu()"
>
  <div class="suite-header__bar">
    <!-- Marca -->
    <button
      type="button"
      class="suite-brand"
      (click)="navegarConCambio('/ver-tickets', 'Tickets')"
      aria-label="Ir al inicio de Suite Ultra"
    >
      <span class="suite-brand__mark">U</span>

      <span class="suite-brand__text">
        <strong>Ultra Gym</strong>
        <small>Suite Ultra</small>
      </span>
    </button>

    <!-- Menú principal -->
    <nav
      class="suite-main-nav"
      aria-label="Navegación principal"
    >
      <button
        *ngFor="let item of menuItems"
        type="button"
        class="suite-main-nav__item"
        [class.suite-main-nav__item--active]="isMainMenuActive(item.label)"
        (mouseenter)="onMainMenuMouseEnter($event, item)"
        (click)="onMainMenuClick(item)"
        [attr.aria-label]="item.label"
      >
        <mat-icon class="suite-main-nav__icon">
          {{ getMenuIcon(item.label) }}
        </mat-icon>

        <span>{{ item.label }}</span>
      </button>
    </nav>

    <!-- Usuario / sesión -->
    <div class="suite-user-area">
      <span
        class="suite-user-area__label"
        *ngIf="usuarioLabel"
        [title]="usuarioLabel"
      >
        {{ usuarioLabel }}
      </span>

      <button
        mat-icon-button
        type="button"
        class="suite-user-area__logout"
        (click)="cerrarSesion()"
        aria-label="Cerrar sesión"
        title="Cerrar sesión"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </div>

  <!-- Submenú conectado al módulo activo -->
  <div
    class="suite-subnav"
    *ngIf="hasVisibleSubmenu()"
  >
    <div class="suite-subnav__panel">
      <div class="suite-subnav__header">
        <span class="suite-subnav__eyebrow">Accesos del módulo</span>
        <strong>{{ currentSubmenu }}</strong>
      </div>

      <div class="suite-subnav__grid">
        <button
          *ngFor="let sub of submenuActual"
          type="button"
          class="suite-subnav-card"
          [class.suite-subnav-card--active]="submenuActivo[currentSubmenu] === sub.label"
          (mouseenter)="moverIndicadorSubmenu($event)"
          (click)="seleccionarSubmenu(sub.label, sub.path)"
          [attr.aria-label]="sub.label"
        >
          <span class="suite-subnav-card__icon">
            <mat-icon>{{ getSubmenuIcon(sub.label) }}</mat-icon>
          </span>

          <span class="suite-subnav-card__content">
            <strong>{{ sub.label }}</strong>
            <small>{{ getSubmenuDescription(sub.label) }}</small>
          </span>

          <mat-icon class="suite-subnav-card__arrow">
            chevron_right
          </mat-icon>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ==========================================================================
     Suite Ultra UI v1 - Área principal
     ========================================================================== -->

<main class="suite-main-content">
  <router-outlet></router-outlet>
</main>


<!-- ==========================================================================
     Suite Ultra UI v1 - Alerta flotante de tickets por validar
     ========================================================================== -->

<div class="suite-floating-layer">
  <div
    *ngIf="shouldShowValidationAlert"
    class="validation-floating-alert"
    [class.validation-floating-alert--normal]="validationSummary?.severity === 'normal'"
    [class.validation-floating-alert--warning]="validationSummary?.severity === 'warning'"
    [class.validation-floating-alert--critical]="validationSummary?.severity === 'critical'"
    cdkDrag
    cdkDragBoundary=".suite-floating-layer"
    [cdkDragFreeDragPosition]="validationAlertPosition"
    (cdkDragStarted)="onTicketValidationDragStarted()"
    (cdkDragEnded)="onTicketValidationDragEnded($event)"
    (click)="goToTicketValidationList()"
    (keydown.enter)="goToTicketValidationList()"
    (keydown.space)="goToTicketValidationList()"
    role="button"
    tabindex="0"
    aria-label="Revisar tickets por validar"
  >
    <div class="validation-floating-alert__halo"></div>

    <div class="validation-floating-alert__content">
      <span class="validation-floating-alert__icon-wrap">
        <mat-icon class="validation-floating-alert__icon">
          {{ getTicketValidationIcon() }}
        </mat-icon>
      </span>

      <span class="validation-floating-alert__text">
        <strong>{{ getTicketValidationTitle() }}</strong>
        <small>{{ getTicketValidationSubtitle() }}</small>
      </span>

      <span class="validation-floating-alert__badge">
        {{ validationSummary?.total_por_validar }}
      </span>
    </div>

    <button
      type="button"
      class="validation-floating-alert__close"
      aria-label="Ocultar alerta por 3 minutos"
      title="Ocultar por 3 minutos"
      (click)="dismissTicketValidationAlert($event)"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>


<!-- ==========================================================================
     Suite Ultra UI v1 - Acción flotante para reporte de errores
     ========================================================================== -->

<button
  mat-fab
  color="warn"
  class="boton-reporte-error"
  cdkDrag
  (cdkDragStarted)="onReporteBugDragStarted()"
  (cdkDragEnded)="onReporteBugDragEnded($event)"
  (click)="onClickReporteBug()"
  aria-label="Reportar error"
>
  🐞
</button>
