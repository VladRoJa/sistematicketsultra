<!-- frontend/src/app/shared/loader/loader.component.html -->

<!-- ==========================================================================
     Suite Ultra UI v1 - Loader global
     ========================================================================== -->

<section
  class="ultra-loader"
  role="status"
  aria-live="polite"
  aria-label="Cargando Suite Ultra"
>
  <div class="ultra-loader__ambient ultra-loader__ambient--one"></div>
  <div class="ultra-loader__ambient ultra-loader__ambient--two"></div>

  <div class="ultra-loader__content">
    <div class="ultra-loader__orb" aria-hidden="true">
      <span class="ultra-loader__halo ultra-loader__halo--outer"></span>
      <span class="ultra-loader__halo ultra-loader__halo--inner"></span>
      <span class="ultra-loader__ring ultra-loader__ring--primary"></span>
      <span class="ultra-loader__ring ultra-loader__ring--secondary"></span>

      <div class="ultra-loader__logo-wrap">
        <svg
          class="ultra-loader__logo"
          viewBox="0 0 100 100"
          xmlns="http://www.w3.org/2000/svg"
          focusable="false"
          aria-hidden="true"
        >
          <circle cx="50" cy="50" r="42" fill="var(--ultra-orange)" />
          <path
            d="M50 10 L72 10 L58 47 H80 L47 92 H28 L42 56 H20 Z"
            fill="white"
          />
        </svg>
      </div>
    </div>

    <div class="ultra-loader__copy">
      <h1>
        Cargando <span>Suite Ultra</span>
      </h1>
      <p>Preparando módulos y datos...</p>
    </div>

    <div class="ultra-loader__dots" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</section>
